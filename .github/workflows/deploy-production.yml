name: Deploy to Production

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-staging-to-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check staging branch exists
        run: |
          if ! git rev-parse --verify origin/staging >/dev/null 2>&1; then
            echo "::error::staging branch does not exist"
            exit 1
          fi

      - name: Check staging is ahead of main
        run: |
          BEHIND=$(git rev-list --count origin/staging..origin/main)
          AHEAD=$(git rev-list --count origin/main..origin/staging)
          echo "staging is $AHEAD commits ahead and $BEHIND commits behind main"
          if [ "$AHEAD" -eq 0 ]; then
            echo "::error::staging has no new commits to deploy"
            exit 1
          fi
          if [ "$BEHIND" -gt 0 ]; then
            echo "::warning::main is $BEHIND commits ahead of staging — merge will be attempted"
          fi

      - name: Merge staging into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge origin/staging --no-edit
          git push origin main

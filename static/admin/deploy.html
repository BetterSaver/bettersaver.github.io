<!DOCTYPE html>
<html lang="en-nz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Deploy to Production | BetterSaver Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f5f7;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center; 
    }
    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      max-width: 480px;
      width: 100%;
      padding: 40px;
      margin: 20px;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .section {
      margin-bottom: 28px;
    }
    .section-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 12px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-primary {
      background: #2563eb;
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) {
      background: #1d4ed8;
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .btn-secondary:hover {
      background: #e5e5e5;
    }
    .status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.5;
      display: none;
    }
    .status.info { display: block; background: #eff6ff; color: #1e40af; }
    .status.success { display: block; background: #f0fdf4; color: #166534; }
    .status.error { display: block; background: #fef2f2; color: #991b1b; }
    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 28px 0;
    }
    .pat-setup {
      margin-top: 12px;
    }
    .pat-setup input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-bottom: 10px;
      font-family: monospace;
    }
    .pat-setup input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .pat-actions {
      display: flex;
      gap: 8px;
    }
    .pat-actions .btn {
      flex: 1;
      padding: 10px;
      font-size: 0.85rem;
    }
    .btn-danger {
      background: #fee2e2;
      color: #991b1b;
    }
    .btn-danger:hover {
      background: #fecaca;
    }
    .link-back {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 0.85rem;
      text-decoration: none;
    }
    .link-back:hover { color: #333; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Deploy to Production</h1>
    <p class="subtitle">Merge the <strong>staging</strong> branch into <strong>main</strong> to publish changes to the live site.</p>

    <!-- Option A: GitHub link -->
    <div class="section">
      <div class="section-label">Option A &mdash; Via GitHub</div>
      <a href="https://github.com/BetterSaver/bettersaver.github.io/actions/workflows/deploy-production.yml"
         target="_blank"
         rel="noopener"
         class="btn btn-secondary">
        Open GitHub Actions &rarr;
      </a>
    </div>

    <hr class="divider">

    <!-- Option B: One-click deploy -->
    <div class="section">
      <div class="section-label">Option B &mdash; One-click deploy</div>

      <div id="pat-prompt" class="pat-setup" style="display:none;">
        <input type="password" id="pat-input" placeholder="Paste your GitHub PAT here">
        <p style="font-size:0.8rem; color:#888; margin-bottom:10px;">
          Needs <strong>actions:write</strong> permission on this repo only.
          Stored in your browser, never sent to our servers.
        </p>
        <div class="pat-actions">
          <button class="btn btn-primary" onclick="savePat()">Save token</button>
        </div>
      </div>

      <div id="deploy-ready" style="display:none;">
        <button class="btn btn-primary" id="deploy-btn" onclick="deploy()">
          Deploy staging to production
        </button>
        <div id="status" class="status"></div>
        <div class="pat-actions" style="margin-top:12px;">
          <button class="btn btn-danger" onclick="clearPat()">Remove saved token</button>
        </div>
      </div>
    </div>

    <a href="/admin/" class="link-back">&larr; Back to CMS</a>
  </div>

  <script>
    const REPO = 'BetterSaver/bettersaver.github.io';
    const WORKFLOW = 'deploy-production.yml';
    const PAT_KEY = 'bs_deploy_pat';

    function init() {
      const pat = localStorage.getItem(PAT_KEY);
      document.getElementById('pat-prompt').style.display = pat ? 'none' : 'block';
      document.getElementById('deploy-ready').style.display = pat ? 'block' : 'none';
    }

    function savePat() {
      const pat = document.getElementById('pat-input').value.trim();
      if (!pat) return;
      localStorage.setItem(PAT_KEY, pat);
      document.getElementById('pat-input').value = '';
      init();
    }

    function clearPat() {
      localStorage.removeItem(PAT_KEY);
      setStatus('', '');
      init();
    }

    function setStatus(message, type) {
      const el = document.getElementById('status');
      el.textContent = message;
      el.className = 'status' + (type ? ' ' + type : '');
    }

    async function deploy() {
      const pat = localStorage.getItem(PAT_KEY);
      if (!pat) { init(); return; }

      const btn = document.getElementById('deploy-btn');
      btn.disabled = true;
      btn.textContent = 'Deploying...';
      setStatus('Triggering workflow...', 'info');

      try {
        const res = await fetch(
          `https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,
          {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${pat}`,
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28'
            },
            body: JSON.stringify({ ref: 'main' })
          }
        );

        if (res.status === 204) {
          setStatus('Deploy triggered. Staging will be merged into main shortly. Check GitHub Actions for progress.', 'success');
        } else if (res.status === 401) {
          setStatus('Authentication failed. Your token may be expired or invalid. Remove it and try again.', 'error');
        } else if (res.status === 404) {
          setStatus('Workflow not found. Make sure deploy-production.yml exists on the main branch.', 'error');
        } else {
          const data = await res.json().catch(() => ({}));
          setStatus(`Failed (HTTP ${res.status}): ${data.message || 'Unknown error'}`, 'error');
        }
      } catch (err) {
        setStatus(`Network error: ${err.message}`, 'error');
      }

      btn.disabled = false;
      btn.textContent = 'Deploy staging to production';
    }

    init();
  </script>
</body>
</html>

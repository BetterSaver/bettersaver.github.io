<!DOCTYPE html>
<html lang="{{ site.LanguageCode | default "en" }}">
<head>
<meta charset="utf-8">
<title>Redirecting…</title>
<meta name="robots" content="noindex, nofollow">

<p>Redirecting to <a href="{{ .Params.redirect_to | default "/" }}">{{ .Params.redirect_to | default "/" }}</a>…</p>

</html>
